dataset: orders
layer: silver
version: v1

checks:
  - name: order_id_not_null
    type: not_null
    columns: [order_id]
    severity: critical

  - name: customer_id_not_null
    type: not_null
    columns: [customer_id]
    severity: critical

  - name: unique_order_id
    type: unique
    columns: [order_id]
    severity: critical

  - name: allowed_order_status
    type: in_set
    column: order_status
    allowed:
      - approved
      - canceled
      - created
      - delivered
      - invoiced
      - processing
      - shipped
      - unavailable
    severity: critical